version: 2

models:
  - name: stg_student
    description: "Staged student dimension."
    columns:
      - name: student_key
        data_tests:
          - unique
          - not_null
      - name: national_id
        data_tests:
          - not_null
      - name: gender
        data_tests:
          - not_null
      - name: is_current
        data_tests:
          - not_null

  - name: stg_health
    description: "Staged health dimension."
    columns:
      - name: health_key
        data_tests:
          - unique
          - not_null
      - name: health_condition
        data_tests:
          - not_null
      - name: severity_level
        data_tests:
          - not_null

  - name: stg_lifestyle
    description: "Staged lifestyle dimension."
    columns:
      - name: lifestyle_key
        data_tests:
          - unique
          - not_null
      - name: diet_type
        data_tests:
          - not_null
      - name: smoking_alcohol
        data_tests:
          - not_null
      - name: physical_activity_level
        data_tests:
          - not_null

  - name: stg_activity
    description: "Staged activity dimension."
    columns:
      - name: activity_key
        data_tests:
          - unique
          - not_null
      - name: activity_type
        data_tests:
          - not_null

  - name: stg_sleep
    description: "Staged sleep quality dimension."
    columns:
      - name: sleep_key
        data_tests:
          - unique
          - not_null
      - name: sleep_quality
        data_tests:
          - not_null

  - name: stg_date
    description: "Staged date dimension."
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null
      - name: month
        data_tests:
          - not_null
      - name: year
        data_tests:
          - not_null

  - name: stg_fact
    description: "Staged fact table."
    columns:
      - name: fact_id
        data_tests:
          - unique
          - not_null
      - name: student_key
        data_tests:
          - not_null
      - name: health_key
        data_tests:
          - not_null
      - name: lifestyle_key
        data_tests:
          - not_null
      - name: activity_key
        data_tests:
          - not_null
      - name: sleep_key
        data_tests:
          - not_null
      - name: date_key
        data_tests:
          - not_null
      - name: bmi
        data_tests:
          - not_null
      - name: heart_rate
        data_tests:
          - not_null
      - name: stress_level
        data_tests:
          - not_null
      - name: sleep_duration
        data_tests:
          - not_null