version: 2

models:
  - name: dim_student_transformed
    description: "Final pseudonymised student dimension."
    columns:
      - name: student_key
        data_tests:
          - unique
          - not_null
      - name: national_id_hashed
        data_tests:
          - not_null
      - name: gender
        data_tests:
          - not_null
      - name: age_derived
        data_tests:
          - not_null

  - name: fact_health_transformed
    description: "Final feature-engineered fact table."
    columns:
      - name: fact_id
        data_tests:
          - unique
          - not_null
      - name: health_condition
        data_tests:
          - not_null
      - name: bmi_class
        data_tests:
          - not_null
      - name: health_trend_indicator
        data_tests:
          - not_null
      - name: composite_activity_score
        data_tests:
          - not_null
      - name: bmi
        data_tests:
          - not_null
      - name: heart_rate
        data_tests:
          - not_null

  - name: mrt_health_distribution
    description: "Health condition distribution metric."
    columns:
      - name: record_count
        data_tests:
          - not_null

  - name: mrt_bmi_by_gender
    description: "BMI statistics by gender and health condition."

  - name: mrt_sleep_adequacy
    description: "Sleep adequacy rates by health condition."

  - name: mrt_weekly_activity
    description: "Weekly average health indicators."

  - name: mrt_risk_correlations
    description: "Behavioural risk factor cross-analysis."