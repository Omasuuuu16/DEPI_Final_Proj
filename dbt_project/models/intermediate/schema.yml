version: 2

models:
  - name: int_student_features
    description: "Pseudonymised student dimension."
    columns:
      - name: student_key
        data_tests:
          - unique
          - not_null
      - name: national_id_hashed
        data_tests:
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: gender
        data_tests:
          - not_null
      - name: age_derived
        data_tests:
          - not_null

  - name: int_fact_enriched
    description: "Fully enriched fact table."
    columns:
      - name: fact_id
        data_tests:
          - unique
          - not_null
      - name: health_condition
        data_tests:
          - not_null
      - name: bmi_class
        data_tests:
          - not_null
      - name: health_trend_indicator
        data_tests:
          - not_null
      - name: composite_activity_score
        data_tests:
          - not_null