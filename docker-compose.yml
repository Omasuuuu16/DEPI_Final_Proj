services:

  airflow-init:
    build: .
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password adminpassword \
          --firstname Byte \
          --lastname Busters \
          --role Admin \
          --email admin@bytebusters.org
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      SQL_SERVER_HOST: host.docker.internal
      SQL_SERVER_DB: StudentHealthDB
      SQL_SERVER_USER: sa
      SQL_SERVER_PASSWORD: ByteBusters123!
      DUCKDB_PATH: /opt/airflow/data/student_health.duckdb
    volumes:
      - .:/opt/airflow
      - ./dags:/opt/airflow/dags
    user: "${AIRFLOW_UID:-50000}:0"

  airflow-webserver:
    build: .
    command: webserver
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      SQL_SERVER_HOST: host.docker.internal
      SQL_SERVER_DB: StudentHealthDB
      SQL_SERVER_USER: sa
      SQL_SERVER_PASSWORD: DepiProj2026
      DUCKDB_PATH: /opt/airflow/data/student_health.duckdb
    volumes:
      - .:/opt/airflow
      - ./dags:/opt/airflow/dags
    user: "${AIRFLOW_UID:-50000}:0"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build: .
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      SQL_SERVER_HOST: host.docker.internal
      SQL_SERVER_DB: StudentHealthDB
      SQL_SERVER_USER: sa
      SQL_SERVER_PASSWORD: ByteBusters@2025 
      DUCKDB_PATH: /opt/airflow/data/student_health.duckdb
    volumes:
      - .:/opt/airflow
      - ./dags:/opt/airflow/dags
    user: "${AIRFLOW_UID:-50000}:0"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully